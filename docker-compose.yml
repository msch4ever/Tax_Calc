version: '3.8'

services:
  tax-calculator:
    build: .
    image: czech-stock-tax-calculator:latest
    container_name: stock-tax-calculator
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

