guide.exempt.title=Osvobození od daně při prodeji akcií
guide.exempt.100k=<strong>Limit 100 000 Kč:</strong> Pokud je celkový roční hrubý příjem ze VŠECH prodejů akcií &lt; 100 000 Kč → plně osvobozeno (bez ohledu na dobu držení)
guide.exempt.3yr=<strong>Časový test 3 roky:</strong> Pokud jsou akcie drženy déle než 3 roky A celkové hrubé příjmy jsou &lt; 40 000 000 Kč → osvobozeno
guide.exempt.loss=Ztráty z osvobozených akcií <strong>nelze</strong> započítat proti zdanitelným ziskům

