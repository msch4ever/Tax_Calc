guide.exch.title=Pravidla pro směnné kurzy
guide.exch.warning=<strong>⚠️ Důležité:</strong> Můžete si vybrat mezi denními kurzy ČNB NEBO ročními průměrnými kurzy (GFŘ), ale musíte je aplikovat <strong>jednotně</strong> pro všechny transakce v daném daňovém roce.
guide.exch.cgTitle=Pro kapitálové zisky (při použití průměrného ročního kurzu)
guide.exch.comp=Položka
guide.exch.rateToUse=Jaký kurz použít
guide.exch.sale=Výnosy z prodeje
guide.exch.saleRate=Roční průměrný kurz za rok <strong>PRODEJE</strong>
guide.exch.cost=Pořizovací cena (náklad)
guide.exch.costRate=Roční průměrný kurz za rok <strong>NABYTÍ/NÁKUPU</strong>
guide.exch.note=<em>Při prodeji akcií nabytých v předchozích letech použijte rozdílné roční kurzy!</em>

guide.calc.title=Výpočet kapitálových zisků/ztrát
guide.calc.desc=Při prodeji akcií musíte spočítat, zda jste dosáhli <strong>zisku</strong> nebo <strong>ztráty</strong>:
guide.calc.formula=<strong>Vzorec:</strong><br>Zisk/Ztráta = (Prodejní cena × Množství × Kurz v roce prodeje) − (Pořizovací cena × Množství × Kurz v roce pořízení) − Transakční poplatky
guide.calc.profitTitle=Pokud jste dosáhli ZISKU
guide.calc.profit1=Zisk je <strong>zdaněn jako "ostatní příjem"</strong> (pokud není osvobozen)
guide.calc.profit2=Přičtěte ke svému celkovému zdanitelnému příjmu za daný rok
guide.calc.profit3=Sazba daně: 15 % (nebo 23 %, pokud celkový příjem přesáhne 1 676 052 Kč)
guide.calc.lossTitle=Pokud jste dosáhli ZTRÁTY
guide.calc.loss1=Ztráty <strong>nejsou přímo zdanitelné</strong>, ale stále je musíte uvést v přiznání
guide.calc.loss2=Ztráty lze <strong>odečíst od zisků</strong> z jiných prodejů akcií ve stejném roce
guide.calc.loss3=Ztráty <strong>nelze</strong> převádět do dalších let
guide.calc.loss4=Ztráty z <strong>osvobozených prodejů nelze</strong> započítat proti zdanitelným ziskům
guide.calc.opt=<strong>💡 Daňová optimalizace:</strong> Pokud máte ve stejném roce zisky i ztráty, ztráty snižují vaše zdanitelné zisky. Zvolte denní nebo roční kurzy tak (ale jednotně), abyste minimalizovali svou daň.

guide.exRsu.title=Příklad: Výpočet kapitálových zisků u RSU
guide.exRsu.desc=Prodáváte 100 akcií nabytých v roce 2025:
guide.exRsu.calc=Prodejní cena za akcii: $40<br>FMV při nabytí (pořizovací cena): $30<br>Kurz (2025): 21,84 CZK/USD<br><br><strong>Příjem:</strong> $40 × 100 × 21,84 = <strong>87 360 Kč</strong><br><strong>Výdaje:</strong> $30 × 100 × 21,84 = <strong>65 520 Kč</strong><br><strong>Zisk:</strong> 87 360 − 65 520 = <strong>21 840 Kč</strong> (zdanitelný)

guide.exEspp.title=Příklad: Výpočet kapitálových zisků u ESPP
guide.exEspp.desc=Prodáváte 100 ESPP akcií nakoupených v roce 2025:
guide.exEspp.calc=Prodejní cena za akcii: $35<br>FMV při nákupu: $30 (toto je pořizovací cena!)<br>Zlevněná nákupní cena: $25 (již zdaněna jako příjem)<br>Kurz (2025): 21,84 CZK/USD<br><br><strong>Příjem:</strong> $35 × 100 × 21,84 = <strong>76 440 Kč</strong><br><strong>Výdaje:</strong> $30 × 100 × 21,84 = <strong>65 520 Kč</strong><br><strong>Zisk:</strong> 76 440 − 65 520 = <strong>10 920 Kč</strong> (zdanitelný)
guide.exEspp.note=<strong>Poznámka:</strong> FMV při nákupu ($30) se používá jako pořizovací cena, NE zlevněná cena ($25), protože výhoda ze slevy již byla zdaněna jako příjem ze zaměstnání.

guide.return.title=Vyplnění daňového přiznání
guide.return.1=Hrubý příjem z prodeje akcií a související výdaje patří (jako Příloha 2 - Řádek 207 a 208) a následně na <strong>Řádek 40</strong> v Přiznání k dani z příjmů fyzických osob
guide.return.2=Uveďte je v <strong>Příloze 2</strong> (Řádky 207 a 208)
guide.return.3=Ztráty musí být přiznány, ale mohou kompenzovat pouze zisky z jiných cenných papírů ve stejném roce
guide.return.4=Ztráty <strong>nelze</strong> převádět do budoucích let

