# tax-guide.html
guide.title=Czech Tax Guide - RSU & ESPP
guide.subtitle=How to properly report stock compensation income in your Czech tax return.
guide.rates.title=Czech Tax Rates (2025)
guide.rates.desc=The Czech Republic uses a <strong>progressive tax system</strong>:
guide.rates.level=Income Level
guide.rates.rate=Tax Rate
guide.rates.upTo=Up to
guide.rates.above=Above
guide.rates.note=This applies to your total taxable income including employment income, RSU/ESPP income, and capital gains.

guide.exempt.title=Tax Exemptions for Share Sales
guide.exempt.100k=<strong>CZK 100,000 threshold:</strong> If total annual gross income from ALL share sales &lt; CZK 100,000 → fully exempt (regardless of holding period)
guide.exempt.3yr=<strong>3-year holding rule:</strong> If shares held &gt; 3 years AND total gross proceeds &lt; CZK 40,000,000 → exempt
guide.exempt.loss=Losses from exempt shares <strong>cannot</strong> be offset against taxable gains

guide.acq.title=Acquisition Price (Cost Basis)
guide.acq.plan=Plan Type
guide.acq.price=Acquisition Price
guide.acq.expl=Explanation
guide.acq.rsuPrice=FMV at vest date
guide.acq.rsuExpl=Fair Market Value when shares vested
guide.acq.esppPrice=FMV at purchase date
guide.acq.esppExpl=FMV (not discounted price!) because discount was already taxed as income

guide.exch.title=Exchange Rate Rules
guide.exch.warning=<strong>⚠️ Important:</strong> You can choose between daily CNB rates OR yearly average (GFŘ) rates, but must be <strong>consistent</strong> for all transactions in the tax year.
guide.exch.cgTitle=For Capital Gains (Yearly Average Method)
guide.exch.comp=Component
guide.exch.rateToUse=Exchange Rate to Use
guide.exch.sale=Sale Proceeds
guide.exch.saleRate=Yearly average rate for <strong>SALE year</strong>
guide.exch.cost=Cost Basis (Acquisition Price)
guide.exch.costRate=Yearly average rate for <strong>VEST/PURCHASE year</strong>
guide.exch.note=<em>When selling shares vested in previous years, use different yearly rates!</em>

guide.calc.title=Capital Gains/Loss Calculation
guide.calc.desc=When you sell shares, you need to calculate whether you made a <strong>profit</strong> or a <strong>loss</strong>:
guide.calc.formula=<strong>Formula:</strong><br>Profit/Loss = (Sale Price × Quantity × Sale Year Rate) − (Acquisition Price × Quantity × Acquisition Year Rate) − Transaction Costs
guide.calc.profitTitle=If You Made a PROFIT (Gain)
guide.calc.profit1=The profit is <strong>taxable as "other income"</strong> (unless exempt)
guide.calc.profit2=Add to your total taxable income for the year
guide.calc.profit3=Tax rate: 15% (or 23% if total income exceeds CZK 1,676,052)
guide.calc.lossTitle=If You Made a LOSS
guide.calc.loss1=Losses are <strong>not directly taxable</strong> but must still be reported
guide.calc.loss2=Losses can <strong>offset gains</strong> from other share sales in the same year
guide.calc.loss3=Losses <strong>cannot</strong> be carried forward to future years
guide.calc.loss4=Losses from <strong>exempt sales cannot</strong> offset taxable gains
guide.calc.opt=<strong>💡 Tax Optimization:</strong> If you have both gains and losses in the same year, the losses reduce your taxable gains. Choose daily or yearly rates consistently to minimize your tax.

guide.exRsu.title=Example: RSU Capital Gains Calculation
guide.exRsu.desc=You sell 100 shares that vested in 2025:
guide.exRsu.calc=Sale price per share: $40<br>FMV at vest (acquisition price): $30<br>Exchange rate (2025): 21.84 CZK/USD<br><br><strong>Income:</strong> $40 × 100 × 21.84 = <strong>CZK 87,360</strong><br><strong>Expenses:</strong> $30 × 100 × 21.84 = <strong>CZK 65,520</strong><br><strong>Profit:</strong> 87,360 − 65,520 = <strong>CZK 21,840</strong> (taxable)

guide.exEspp.title=Example: ESPP Capital Gains Calculation
guide.exEspp.desc=You sell 100 ESPP shares purchased in 2025:
guide.exEspp.calc=Sale price per share: $35<br>FMV at purchase: $30 (this is the acquisition price!)<br>Discounted purchase price: $25 (already taxed as income)<br>Exchange rate (2025): 21.84 CZK/USD<br><br><strong>Income:</strong> $35 × 100 × 21.84 = <strong>CZK 76,440</strong><br><strong>Expenses:</strong> $30 × 100 × 21.84 = <strong>CZK 65,520</strong><br><strong>Profit:</strong> 76,440 − 65,520 = <strong>CZK 10,920</strong> (taxable)
guide.exEspp.note=<strong>Note:</strong> The FMV at purchase ($30) is used as acquisition price, NOT the discounted price ($25), because the discount benefit was already declared as employment income.

guide.return.title=Tax Return Reporting
guide.return.1=Gross income from share sales and related expenses go on <strong>Line 40</strong> of Czech PITR
guide.return.2=Also report in <strong>Attachment 2</strong> (Lines 207 and 208)
guide.return.3=Losses must be declared but can only offset gains from other securities in the same year
guide.return.4=Losses <strong>cannot</strong> be carried forward to future years

