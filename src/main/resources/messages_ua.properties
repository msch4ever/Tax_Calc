guide.calc.title=Розрахунок приросту капіталу/збитків
guide.calc.desc=Під час продажу акцій вам необхідно розрахувати, отримали ви <strong>прибуток</strong> або <strong>збиток</strong>:
guide.calc.formula=<strong>Формула:</strong><br>Прибуток/Збиток = (Ціна продажу × Кількість × Курс у рік продажу) − (Ціна придбання × Кількість × Курс у рік придбання) − Транзакційні витрати
guide.calc.profitTitle=Якщо ви отримали ПРИБУТОК
guide.calc.profit1=Прибуток <strong>оподатковується як "інший дохід"</strong> (якщо не звільнений)
guide.calc.profit2=Додайте до загального оподатковуваного доходу за рік
guide.calc.profit3=Податкова ставка: 15% (або 23%, якщо загальний дохід перевищує 1 676 052 CZK)
guide.calc.lossTitle=Якщо ви отримали ЗБИТОК
guide.calc.loss1=Збитки <strong>не оподатковуються безпосередньо</strong>, але все одно повинні бути задекларовані
guide.calc.loss2=Збитки можуть <strong>компенсувати прибуток</strong> від продажу інших акцій у тому ж році
guide.calc.loss3=Збитки <strong>не можуть</strong> бути перенесені на майбутні роки
guide.calc.loss4=Збитки від <strong>звільнених продажів не можуть</strong> компенсувати оподатковуваний прибуток
guide.calc.opt=<strong>💡 Податкова оптимізація:</strong> Якщо у вас є як прибуток, так і збитки в одному році, збитки зменшують ваш оподатковуваний прибуток. Послідовно вибирайте денні або річні курси, щоб мінімізувати податок.

guide.exRsu.title=Приклад: Розрахунок приросту капіталу для RSU
guide.exRsu.desc=Ви продаєте 100 акцій, придбаних у 2025 році:
guide.exRsu.calc=Ціна продажу за акцію: $40<br>FMV при вестингу (ціна придбання): $30<br>Обмінний курс (2025): 21.84 CZK/USD<br><br><strong>Дохід:</strong> $40 × 100 × 21.84 = <strong>87 360 CZK</strong><br><strong>Витрати:</strong> $30 × 100 × 21.84 = <strong>65 520 CZK</strong><br><strong>Прибуток:</strong> 87 360 − 65 520 = <strong>21 840 CZK</strong> (оподатковуваний)

guide.exEspp.title=Приклад: Розрахунок приросту капіталу для ESPP
guide.exEspp.desc=Ви продаєте 100 акцій ESPP, куплених у 2025 році:
guide.exEspp.calc=Ціна продажу за акцію: $35<br>FMV при покупці: $30 (це ціна придбання!)<br>Ціна покупки зі знижкою: $25 (вже оподаткована як дохід)<br>Обмінний курс (2025): 21.84 CZK/USD<br><br><strong>Дохід:</strong> $35 × 100 × 21.84 = <strong>76 440 CZK</strong><br><strong>Витрати:</strong> $30 × 100 × 21.84 = <strong>65 520 CZK</strong><br><strong>Прибуток:</strong> 76 440 − 65 520 = <strong>10 920 CZK</strong> (оподатковуваний)
guide.exEspp.note=<strong>Примітка:</strong> Як ціна придбання використовується FMV при покупці ($30), А НЕ ціна зі знижкою ($25), оскільки знижка вже була задекларована як дохід від працевлаштування.

guide.return.title=Звітність у податковій декларації
guide.return.1=Обмінюваний дохід від продажу акцій та пов'язані з цим витрати вказуються на <strong>Рядку 40</strong> чеської декларації (PITR)
guide.return.2=Також вкажіть їх у <strong>Додатку 2</strong> (Рядки 207 і 208)
guide.return.3=Збитки повинні бути задекларовані, але можуть компенсувати лише прибуток від інших цінних паперів у тому ж році
guide.return.4=Збитки <strong>не можуть</strong> переноситися на майбутні роки

