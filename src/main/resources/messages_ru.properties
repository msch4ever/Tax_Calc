# tax-guide.html
guide.title=Налоговый справочник Чехии - RSU и ESPP
guide.subtitle=Как правильно декларировать доход от акций в чешской налоговой декларации.
guide.rates.title=Налоговые ставки в Чехии (2025)
guide.rates.desc=В Чешской Республике используется <strong>прогрессивная налоговая система</strong>:
guide.rates.level=Уровень дохода
guide.rates.rate=Налоговая ставка
guide.rates.upTo=До
guide.rates.above=Свыше
guide.rates.note=Это относится к вашему общему налогооблагаемому доходу, включая доход от работы по найму, доход от RSU/ESPP и прирост капитала.

guide.exempt.title=Освобождение от налогов при продаже акций
guide.exempt.100k=<strong>Порог в 100 000 CZK:</strong> Если общий годовой валовой доход от ВСЕХ продаж акций менее 100 000 CZK → полностью освобождается (независимо от срока удержания)
guide.exempt.3yr=<strong>Правило 3-х лет:</strong> Если акции удерживались более 3 лет И общая выручка менее 40 000 000 CZK → освобождается
guide.exempt.loss=Убытки от необлагаемых налогом акций <strong>не могут</strong> компенсировать налогооблагаемую прибыль

guide.acq.title=Цена приобретения (Налоговая база)
guide.acq.plan=Тип плана
guide.acq.price=Цена приобретения
guide.acq.expl=Объяснение
guide.acq.rsuPrice=FMV на дату вестинга
guide.acq.rsuExpl=Справедливая рыночная стоимость (FMV) при вестинге акций
guide.acq.esppPrice=FMV на дату покупки
guide.acq.esppExpl=FMV (не цена со скидкой!), так как скидка уже была обложена налогом как доход

guide.exch.title=Правила обменного курса
guide.exch.warning=<strong>⚠️ Важно:</strong> Вы можете выбирать между дневными курсами ЧНБ ИЛИ среднегодовыми курсами (GFŘ), но вы должны быть <strong>последовательны</strong> для всех транзакций в налоговом году.
guide.exch.cgTitle=Для прироста капитала (Метод среднегодового курса)
guide.exch.comp=Компонент
guide.exch.rateToUse=Используемый курс
guide.exch.sale=Выручка от продажи
guide.exch.saleRate=Среднегодовой курс за год <strong>ПРОДАЖИ</strong>
guide.exch.cost=Цена приобретения (База)
guide.exch.costRate=Среднегодовой курс за год <strong>ВЕСТИНГА/ПОКУПКИ</strong>
guide.exch.note=<em>При продаже акций, полученных в предыдущие годы, используйте разные годовые курсы!</em>

guide.calc.title=Расчет прироста капитала/убытков
guide.calc.desc=При продаже акций вам необходимо рассчитать, получили ли вы <strong>прибыль</strong> или <strong>убыток</strong>:
guide.calc.formula=<strong>Формула:</strong><br>Прибыль/Убыток = (Цена продажи × Количество × Курс в год продажи) − (Цена приобретения × Количество × Курс в год приобретения) − Транзакционные издержки
guide.calc.profitTitle=Если вы получили ПРИБЫЛЬ
guide.calc.profit1=Прибыль <strong>облагается налогом как "прочий доход"</strong> (если не освобождена)
guide.calc.profit2=Добавьте к общему налогооблагаемому доходу за год
guide.calc.profit3=Налоговая ставка: 15% (или 23%, если общий доход превышает 1 676 052 CZK)
guide.calc.lossTitle=Если вы получили УБЫТОК
guide.calc.loss1=Убытки <strong>не облагаются налогом напрямую</strong>, но все равно должны быть задекларированы
guide.calc.loss2=Убытки могут <strong>компенсировать прибыль</strong> от продажи других акций в том же году
guide.calc.loss3=Убытки <strong>не могут</strong> быть перенесены на будущие годы
guide.calc.loss4=Убытки от <strong>освобожденных продаж не могут</strong> компенсировать налогооблагаемую прибыль
guide.calc.opt=<strong>💡 Налоговая оптимизация:</strong> Если у вас есть как прибыль, так и убытки в одном году, убытки уменьшают вашу налогооблагаемую прибыль. Последовательно выбирайте дневные или годовые курсы, чтобы минимизировать налог.

guide.exRsu.title=Пример: Расчет прироста капитала для RSU
guide.exRsu.desc=Вы продаете 100 акций, приобретенных в 2025 году:
guide.exRsu.calc=Цена продажи за акцию: $40<br>FMV при вестинге (цена приобретения): $30<br>Обменный курс (2025): 21.84 CZK/USD<br><br><strong>Доход:</strong> $40 × 100 × 21.84 = <strong>87 360 CZK</strong><br><strong>Расходы:</strong> $30 × 100 × 21.84 = <strong>65 520 CZK</strong><br><strong>Прибыль:</strong> 87 360 − 65 520 = <strong>21 840 CZK</strong> (облагаемая налогом)

guide.exEspp.title=Пример: Расчет прироста капитала для ESPP
guide.exEspp.desc=Вы продаете 100 акций ESPP, купленных в 2025 году:
guide.exEspp.calc=Цена продажи за акцию: $35<br>FMV при покупке: $30 (это цена приобретения!)<br>Цена покупки со скидкой: $25 (уже обложена налогом как доход)<br>Обменный курс (2025): 21.84 CZK/USD<br><br><strong>Доход:</strong> $35 × 100 × 21.84 = <strong>76 440 CZK</strong><br><strong>Расходы:</strong> $30 × 100 × 21.84 = <strong>65 520 CZK</strong><br><strong>Прибыль:</strong> 76 440 − 65 520 = <strong>10 920 CZK</strong> (облагаемая налогом)
guide.exEspp.note=<strong>Примечание:</strong> В качестве цены приобретения используется FMV при покупке ($30), А НЕ цена со скидкой ($25), поскольку скидка уже была задекларирована как доход от работы по найму.

guide.return.title=Отчетность в налоговой декларации
guide.return.1=Общий доход от продажи акций и связанные с этим расходы указываются на <strong>Строке 40</strong> чешской декларации ПДФЛ (PITR)
guide.return.2=Также укажите их в <strong>Приложении 2</strong> (Строки 207 и 208)
guide.return.3=Убытки должны быть задекларированы, но могут компенсировать только прибыль от других ценных бумаг в том же году
guide.return.4=Убытки <strong>не могут</strong> переноситься на будущие годы

